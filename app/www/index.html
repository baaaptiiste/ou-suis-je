<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RandoTracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0d14;
      --bg2: #131825;
      --bg3: #1b2233;
      --border: rgba(255,255,255,.08);
      --text: #e8edf6;
      --muted: #8b95a8;
      --green: #34d399;
      --blue: #5b9dff;
      --red: #ff6b7a;
      --amber: #f2c14e;
      --radius: 16px;
      --shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      margin: 0; background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .screen { display: none; }
    .screen.on { display: block; }
    .pad { padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); max-width: 520px; margin: 0 auto; }

    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .brand .logo { width: 44px; height: 44px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: linear-gradient(145deg, #1e2638, #141a28); border: 1px solid var(--border); box-shadow: var(--shadow); }
    .brand h1 { font-size: 20px; margin: 0; letter-spacing: -.02em; }
    .brand .tag { font-size: 12px; color: var(--muted); margin-top: 2px; }
    h1 { font-size: 20px; margin: 0 0 16px; letter-spacing: -.02em; }

    label { display: block; font-size: 12px; color: var(--muted); margin: 4px 2px 6px; font-weight: 600; letter-spacing: .01em; }
    input {
      width: 100%; padding: 13px 14px; margin: 0 0 14px; font-size: 15px;
      border-radius: 12px; border: 1px solid var(--border); background: var(--bg3); color: var(--text);
      transition: border-color .15s, box-shadow .15s; outline: none;
    }
    input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(52,211,153,.18); }

    button {
      font-size: 16px; padding: 15px 16px; border: 0; border-radius: 14px; cursor: pointer;
      width: 100%; margin-top: 12px; font-weight: 600; letter-spacing: -.01em;
      transition: transform .08s ease, filter .15s; color: #fff;
    }
    button:active { transform: scale(.985); filter: brightness(1.05); }
    .start { background: var(--green); color: #052b1e; }
    .stop { background: var(--red); color: #2b0509; }
    .arr { background: var(--amber); color: #2b2205; }
    .blue { background: var(--blue); color: #04152e; }
    .green { background: var(--green); color: #052b1e; }
    .ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }

    /* Cartes de choix de mode */
    .mode {
      --acc: var(--green);
      display: flex; align-items: center; gap: 14px; text-align: left;
      padding: 18px; background: var(--bg2); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .mode.blue { --acc: var(--blue); background: var(--bg2); }
    .mode.green { --acc: var(--green); background: var(--bg2); }
    .mode .mode-ico {
      flex: 0 0 auto; width: 48px; height: 48px; border-radius: 14px; font-size: 24px;
      display: flex; align-items: center; justify-content: center;
      background: color-mix(in srgb, var(--acc) 18%, transparent);
      border: 1px solid color-mix(in srgb, var(--acc) 35%, transparent);
    }
    .mode .mode-txt { display: flex; flex-direction: column; gap: 2px; }
    .mode .mode-txt b { font-size: 17px; font-weight: 600; }
    .mode .mode-txt small { font-size: 12.5px; color: var(--muted); }
    .mode::after { content: "›"; margin-left: auto; color: var(--muted); font-size: 22px; }

    .back {
      background: none; color: var(--muted); width: auto; padding: 6px 0; margin: 0 0 4px;
      font-size: 14px; font-weight: 600; text-align: left;
    }
    .sub { font-size: 12px; color: var(--muted); margin-top: 16px; line-height: 1.5; text-align: center; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 18px; }
    .stat { background: var(--bg2); padding: 14px; border-radius: 14px; border: 1px solid var(--border); }
    .stat b { display: block; font-size: 21px; font-weight: 700; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
    .stat span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }

    #log { margin-top: 16px; font-size: 13px; color: var(--muted); min-height: 20px; padding: 11px 13px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; }

    /* Receveur plein ecran */
    #receiver.on { display: flex; flex-direction: column; height: 100vh; }
    #recHead { padding: calc(10px + env(safe-area-inset-top)) 14px 10px; background: var(--bg2); border-bottom: 1px solid var(--border); }
    #bar { font-size: 14px; font-weight: 600; margin-top: 2px; letter-spacing: -.01em; }
    #alert { display: none; padding: 11px 14px; font-weight: 600; font-size: 14px; }
    #alert.warn { display: block; background: var(--amber); color: #2b2205; }
    #alert.danger { display: block; background: var(--red); color: #fff; }
    #alert.ok { display: block; background: var(--green); color: #052b1e; }
    #recStats { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; padding: 0; background: var(--border); }
    #recStats .stat { padding: 9px 8px; border-radius: 0; border: 0; background: var(--bg); }
    #recStats b { font-size: 16px; }
    #recStats span { font-size: 9.5px; }
    #map { flex: 1; width: 100%; }
    #mapctrl { display: flex; gap: 8px; margin-top: 8px; }
    .mapbtn {
      width: auto; margin: 0; padding: 8px 14px; font-size: 13px; font-weight: 600;
      background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 999px;
    }
  </style>
</head>
<body>

  <!-- ACCUEIL -->
  <section id="home" class="screen on">
    <div class="pad">
      <div class="brand">
        <div class="logo">🥾</div>
        <div>
          <h1>RandoTracker</h1>
          <div class="tag">Suivi de randonnée en direct</div>
        </div>
      </div>
      <label>Serveur</label>
      <input id="base" placeholder="https://ou-suis-je.onrender.com" />
      <label>Clé secrète</label>
      <input id="key" placeholder="clé partagée" />
      <label>Ton nom (randonneur)</label>
      <input id="hname" placeholder="ex: Baptiste" />
      <button class="mode green" id="goHiker">
        <span class="mode-ico">🥾</span>
        <span class="mode-txt"><b>Je randonne</b><small>Partage ma position en direct</small></span>
      </button>
      <button class="mode blue" id="goReceiver">
        <span class="mode-ico">👁️</span>
        <span class="mode-txt"><b>Je suis une rando</b><small>Carte, trace, stats &amp; alertes</small></span>
      </button>
      <p class="sub">Le suivi randonneur continue même écran éteint.</p>
    </div>
  </section>

  <!-- RANDONNEUR -->
  <section id="hiker" class="screen">
    <div class="pad">
      <button class="back" data-home>← Accueil</button>
      <h1>🥾 Ma rando</h1>
      <button id="toggle" class="start">▶ Démarrer la rando</button>
      <button id="arrived" class="arr" style="display:none">🏁 Je suis arrivé</button>
      <div class="stats">
        <div class="stat"><b id="h_dist">—</b><span>distance</span></div>
        <div class="stat"><b id="h_spd">—</b><span>vitesse</span></div>
        <div class="stat"><b id="h_alt">—</b><span>altitude</span></div>
        <div class="stat"><b id="h_bat">—</b><span>batterie</span></div>
      </div>
      <div id="log">Prêt. Le suivi continue écran éteint.</div>
    </div>
  </section>

  <!-- RECEVEUR -->
  <section id="receiver" class="screen">
    <div id="recHead">
      <button class="back" data-home>← Accueil</button>
      <div id="bar">Recherche…</div>
      <div id="mapctrl">
        <button id="recenter" class="mapbtn">🎯 Recentrer</button>
        <button id="themeToggle" class="mapbtn">🌙 Sombre</button>
      </div>
    </div>
    <div id="alert"></div>
    <div id="recStats">
      <div class="stat"><b id="r_dist">—</b><span>distance</span></div>
      <div class="stat"><b id="r_dur">—</b><span>durée</span></div>
      <div class="stat"><b id="r_gain">—</b><span>déniv +</span></div>
      <div class="stat"><b id="r_spd">—</b><span>vitesse</span></div>
      <div class="stat"><b id="r_alt">—</b><span>altitude</span></div>
      <div class="stat"><b id="r_bat">—</b><span>batterie</span></div>
      <div class="stat"><b id="r_acc">—</b><span>précision</span></div>
      <div class="stat"><b id="r_age">—</b><span>maj</span></div>
    </div>
    <div id="map"></div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const log = (m) => { $("log").textContent = m; try { console.log("[app] " + m); } catch (e) {} };
    window.onerror = (m) => log("JS error: " + m);
    window.onunhandledrejection = (e) => log("Rejet: " + ((e.reason && e.reason.message) ? e.reason.message : e.reason));

    // Plugins (registerPlugin absent sans bundler -> fallback Capacitor.Plugins)
    const reg = (typeof Capacitor !== "undefined" && typeof Capacitor.registerPlugin === "function")
      ? (n) => Capacitor.registerPlugin(n)
      : (n) => ((typeof Capacitor !== "undefined" && Capacitor.Plugins) || {})[n];
    const BG = reg("BackgroundGeolocation");
    const Device = reg("Device");

    // ---- Config partagee ----
    $("base").value = localStorage.getItem("base") || "https://ou-suis-je.onrender.com";
    $("key").value = localStorage.getItem("key") || "";
    $("hname").value = localStorage.getItem("hname") || "";
    $("base").oninput = () => localStorage.setItem("base", $("base").value.trim());
    $("key").oninput = () => localStorage.setItem("key", $("key").value.trim());
    $("hname").oninput = () => localStorage.setItem("hname", $("hname").value.trim());
    const url = (p) => $("base").value.trim() + p + "?key=" + encodeURIComponent($("key").value.trim());

    async function post(p, body) {
      try {
        const r = await fetch(url(p), { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body || {}) });
        if (!r.ok) throw new Error("HTTP " + r.status);
        return true;
      } catch (e) { log("Erreur réseau: " + e.message); return false; }
    }

    // ---- Helpers communs ----
    function haversine(a, b) {
      const R = 6371000, toR = (d) => (d * Math.PI) / 180;
      const dLat = toR(b.lat - a.lat), dLng = toR(b.lng - a.lng);
      const s = Math.sin(dLat / 2) ** 2 + Math.cos(toR(a.lat)) * Math.cos(toR(b.lat)) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(s));
    }
    const fmtDur = (ms) => { const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60); return h > 0 ? `${h}h${String(m).padStart(2, "0")}` : `${m} min`; };
    const fmtAge = (ms) => { const s = Math.floor(ms / 1000); return s < 60 ? s + "s" : Math.floor(s / 60) + " min"; };

    // ---- Navigation entre ecrans ----
    function show(id) {
      ["home", "hiker", "receiver"].forEach((s) => $(s).classList.toggle("on", s === id));
      if (id === "receiver") startReceiver(); else stopReceiver();
    }
    document.querySelectorAll("[data-home]").forEach((b) => (b.onclick = () => show("home")));
    $("goHiker").onclick = () => { if (!$("key").value.trim()) { alert("Renseigne la clé d'abord."); return; } show("hiker"); };
    $("goReceiver").onclick = () => { if (!$("key").value.trim()) { alert("Renseigne la clé d'abord."); return; } show("receiver"); };

    /* =================== RANDONNEUR =================== */
    let watcherId = null, active = false, lastPt = null, distM = 0, lastSendTs = 0;
    const MIN_SEND_MS = 30000, MAX_QUEUE = 5000;
    let queue = [];
    try { queue = JSON.parse(localStorage.getItem("queue") || "[]"); } catch (e) { queue = []; }
    const saveQueue = () => { try { localStorage.setItem("queue", JSON.stringify(queue)); } catch (e) {} };
    function enqueue(p) { queue.push(p); if (queue.length > MAX_QUEUE) queue.shift(); saveQueue(); }
    async function flush() {
      if (!queue.length) return;
      const batch = queue.slice();
      const ok = await post("/batch", { points: batch });
      if (ok) { queue = queue.slice(batch.length); saveQueue(); log("Envoyé " + new Date().toLocaleTimeString() + (queue.length ? " (" + queue.length + " en attente)" : "")); }
      else { log("Hors-ligne — " + queue.length + " point(s) en attente"); }
    }

    async function battery() {
      try { const i = await Device.getBatteryInfo(); return i.batteryLevel != null ? Math.round(i.batteryLevel * 100) : null; }
      catch { return null; }
    }
    async function onLoc(loc) {
      const pt = { lat: loc.latitude, lng: loc.longitude };
      if (lastPt) distM += haversine(lastPt, pt);
      lastPt = pt;
      const spdKmh = loc.speed != null && loc.speed >= 0 ? loc.speed * 3.6 : null;
      $("h_dist").textContent = (distM / 1000).toFixed(2) + " km";
      $("h_spd").textContent = spdKmh != null ? spdKmh.toFixed(1) + " km/h" : "—";
      $("h_alt").textContent = loc.altitude != null ? Math.round(loc.altitude) + " m" : "—";
      const now = Date.now();
      if (now - lastSendTs < MIN_SEND_MS) return;
      lastSendTs = now;
      const bat = await battery();
      $("h_bat").textContent = bat != null ? bat + " %" : "—";
      // Bufferise puis tente d'envoyer (flush vide la file au retour reseau).
      enqueue({ lat: loc.latitude, lng: loc.longitude, acc: loc.accuracy, alt: loc.altitude, spd: spdKmh, bat, ts: now });
      flush();
    }
    async function hikerStart() {
      if (!BG || !BG.addWatcher) { log("⚠️ Plugin GPS introuvable"); return; }
      await post("/start", { label: "Rando " + new Date().toLocaleDateString(), name: $("hname").value.trim() || null });
      lastPt = null; distM = 0; lastSendTs = 0;
      queue = []; saveQueue();
      watcherId = await BG.addWatcher(
        { backgroundMessage: "Suivi rando actif — position partagée", backgroundTitle: "RandoTracker", requestPermissions: true, stale: false, distanceFilter: 10 },
        (location, error) => {
          if (error) { log(error.code === "NOT_AUTHORIZED" ? "Localisation refusée. Active-la dans les réglages." : "Erreur GPS: " + error.message); return; }
          onLoc(location);
        }
      );
      active = true;
      $("toggle").textContent = "⏹ Arrêter"; $("toggle").className = "stop";
      $("arrived").style.display = "block";
      log("Rando active. Suivi même écran éteint.");
    }
    async function hikerStop() {
      if (watcherId) await BG.removeWatcher({ id: watcherId });
      watcherId = null; active = false;
      await post("/stop");
      $("toggle").textContent = "▶ Démarrer la rando"; $("toggle").className = "start";
      $("arrived").style.display = "none";
      log("Rando arrêtée.");
    }
    $("toggle").onclick = async () => {
      try { log(active ? "Arrêt..." : "Démarrage..."); if (active) await hikerStop(); else await hikerStart(); }
      catch (e) { log("Erreur: " + (e && e.message ? e.message : JSON.stringify(e))); }
    };
    $("arrived").onclick = async () => { if (await post("/arrived")) log("Arrivée signalée 🏁"); };

    /* =================== RECEVEUR =================== */
    const SIGNAL_LOST_MS = 5 * 60 * 1000, IDLE_MS = 15 * 60 * 1000, IDLE_RADIUS_M = 60;
    let map = null, line = null, marker = null, accCircle = null, startMark = null, fitted = false, beeped = false, recTimer = null;
    let tileLayer = null, mapDark = localStorage.getItem("maptheme") === "dark";
    const TILES = {
      light: { url: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", opt: { attribution: "© OpenStreetMap", maxZoom: 19 } },
      dark: { url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", opt: { attribution: "© OpenStreetMap © CARTO", maxZoom: 19 } },
    };
    function applyTiles() {
      if (!map) return;
      if (tileLayer) tileLayer.remove();
      const t = mapDark ? TILES.dark : TILES.light;
      tileLayer = L.tileLayer(t.url, t.opt).addTo(map);
      $("themeToggle").textContent = mapDark ? "☀️ Clair" : "🌙 Sombre";
    }
    function recenter() {
      if (!map) return;
      if (line && line.getLatLngs().length > 1) { map.fitBounds(line.getBounds().pad(0.2)); }
      else if (marker) { map.setView(marker.getLatLng(), 15); }
    }
    $("recenter").onclick = recenter;
    $("themeToggle").onclick = () => { mapDark = !mapDark; localStorage.setItem("maptheme", mapDark ? "dark" : "light"); applyTiles(); };

    function beep() {
      try {
        const a = new (window.AudioContext || window.webkitAudioContext)();
        const o = a.createOscillator(), g = a.createGain();
        o.connect(g); g.connect(a.destination); o.frequency.value = 880;
        o.start(); g.gain.setValueAtTime(0.3, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.6); o.stop(a.currentTime + 0.6);
      } catch (e) {}
    }
    function setAlert(cls, msg) {
      $("alert").className = cls; $("alert").textContent = msg;
      if ((cls === "danger" || cls === "warn") && !beeped) { beep(); beeped = true; }
      if (cls === "") beeped = false;
    }
    function ensureMap() {
      if (map) { setTimeout(() => map.invalidateSize(), 100); return; }
      map = L.map("map").setView([46.6, 2.4], 5);
      applyTiles();
      setTimeout(() => map.invalidateSize(), 200);
    }
    function startReceiver() {
      fitted = false; beeped = false;
      ensureMap();
      recRefresh();
      recTimer = setInterval(recRefresh, 10000);
    }
    function stopReceiver() {
      if (recTimer) clearInterval(recTimer);
      recTimer = null;
    }
    async function recRefresh() {
      let d;
      try {
        const r = await fetch(url("/track"));
        if (!r.ok) throw new Error("HTTP " + r.status);
        d = await r.json();
      } catch (e) { $("bar").textContent = "Erreur: " + e.message; return; }

      const pts = d.points || [];
      if (pts.length === 0) { $("bar").textContent = "Pas encore de position. Demande de démarrer la rando."; setAlert("", ""); return; }

      const last = pts[pts.length - 1];
      const latlngs = pts.map((p) => [p.lat, p.lng]);
      if (!line) line = L.polyline(latlngs, { color: "#2e7dff", weight: 4 }).addTo(map); else line.setLatLngs(latlngs);
      if (!startMark) startMark = L.circleMarker(latlngs[0], { radius: 6, color: "#2ec27e", fillOpacity: 1 }).addTo(map).bindPopup("Départ");
      const pos = [last.lat, last.lng];
      if (!marker) marker = L.marker(pos).addTo(map); else marker.setLatLng(pos);
      if (!accCircle) accCircle = L.circle(pos, { radius: last.acc || 0, opacity: .3 }).addTo(map); else accCircle.setLatLng(pos).setRadius(last.acc || 0);
      if (!fitted && pts.length > 1) { map.fitBounds(line.getBounds().pad(0.2)); fitted = true; } else if (!fitted) { map.setView(pos, 15); fitted = true; }

      let dist = 0, gain = 0;
      for (let i = 1; i < pts.length; i++) {
        dist += haversine(pts[i - 1], pts[i]);
        if (pts[i].alt != null && pts[i - 1].alt != null) { const dz = pts[i].alt - pts[i - 1].alt; if (dz > 0) gain += dz; }
      }
      const now = Date.now(), ageMs = now - last.ts;
      $("r_dist").textContent = (dist / 1000).toFixed(2) + " km";
      $("r_dur").textContent = d.startTs ? fmtDur((d.active ? now : last.ts) - d.startTs) : "—";
      $("r_gain").textContent = Math.round(gain) + " m";
      $("r_spd").textContent = last.spd != null ? last.spd.toFixed(1) + " km/h" : "—";
      $("r_alt").textContent = last.alt != null ? Math.round(last.alt) + " m" : "—";
      $("r_bat").textContent = last.bat != null ? last.bat + " %" : "—";
      $("r_acc").textContent = last.acc != null ? "±" + Math.round(last.acc) + " m" : "—";
      $("r_age").textContent = "il y a " + fmtAge(ageMs);
      const who = d.name || d.label || "Rando";
      $("bar").textContent = who + (d.active ? " — en cours" : " — arrêtée");

      if (d.arrived) { setAlert("ok", "🏁 Arrivé !"); return; }
      if (ageMs > SIGNAL_LOST_MS) { setAlert("danger", "⚠️ Aucun signal depuis " + fmtAge(ageMs)); return; }
      if (d.active) {
        let moved = false;
        for (let i = pts.length - 1; i >= 0; i--) { if (now - pts[i].ts > IDLE_MS) break; if (haversine(pts[i], last) > IDLE_RADIUS_M) { moved = true; break; } }
        if (now - pts[0].ts >= IDLE_MS && !moved) { setAlert("warn", "⏸️ Immobile depuis ~" + fmtDur(IDLE_MS)); return; }
      }
      setAlert("", "");
    }
  </script>
</body>
</html>
